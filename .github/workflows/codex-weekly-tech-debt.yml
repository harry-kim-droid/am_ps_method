name: Codex Weekly Tech Debt Report

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  weekly-tech-debt:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Codex weekly report
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/weekly-tech-debt.md
          output-file: weekly-tech-debt-report.md
          sandbox: read-only

      - name: Upload weekly report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-tech-debt-report
          path: weekly-tech-debt-report.md
